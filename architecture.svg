<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>COMMAND CENTER System Architecture</title>
  <desc>Full 3-layer architecture: STM32, Raspberry Pi 4B, x86 Server</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══ Layer 1: STM32 ══ -->
  <rect x="30" y="20" width="620" height="150" rx="14" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text font-family="Arial" font-size="11" fill="#854F0B" x="50" y="40">Hardware Layer</text>
  <text font-family="Arial" font-size="13" font-weight="700" fill="#633806" x="50" y="58">STM32F446RE</text>

  <!-- Boxes y=80 -->
  <rect x="55"  y="82" width="150" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#412402" x="130" y="105" text-anchor="middle">Encoder DC Motor</text>
  <text font-family="Arial" font-size="10" fill="#633806" x="130" y="122" text-anchor="middle">Motor control</text>

  <rect x="265" y="82" width="130" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#412402" x="330" y="105" text-anchor="middle">IMU Gyro</text>
  <text font-family="Arial" font-size="10" fill="#633806" x="330" y="122" text-anchor="middle">Sensor</text>

  <rect x="460" y="82" width="160" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#412402" x="540" y="105" text-anchor="middle">micro-ROS Client</text>
  <text font-family="Arial" font-size="10" fill="#633806" x="540" y="122" text-anchor="middle">FreeRTOS</text>

  <!-- Motor <-> micro-ROS: 박스 아래로 우회 (y=148) -->
  <path d="M130 134 L130 152 L540 152 L540 134" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr-a)" marker-start="url(#arr-a)"/>
  <!-- IMU -> micro-ROS -->
  <line x1="395" y1="108" x2="458" y2="108" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr-a)"/>

  <!-- ↕ 1→2 -->
  <line x1="340" y1="170" x2="340" y2="200" stroke="#888" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text font-family="Arial" font-size="10" fill="#666" x="356" y="188">Serial DMA</text>

  <!-- ══ Layer 2: Raspberry Pi ══ -->
  <rect x="30" y="200" width="620" height="155" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text font-family="Arial" font-size="11" fill="#085041" x="50" y="220">Edge Gateway</text>
  <text font-family="Arial" font-size="13" font-weight="700" fill="#04342C" x="50" y="238">Raspberry Pi 4B</text>

  <!-- Boxes y=252 -->
  <rect x="50"  y="252" width="145" height="52" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#04342C" x="122" y="275" text-anchor="middle">micro-ROS Agent</text>
  <text font-family="Arial" font-size="10" fill="#085041" x="122" y="292" text-anchor="middle">DDS bridge</text>

  <rect x="225" y="252" width="130" height="52" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#04342C" x="290" y="275" text-anchor="middle">YDLidar X4</text>
  <text font-family="Arial" font-size="10" fill="#085041" x="290" y="292" text-anchor="middle">LiDAR sensor</text>

  <rect x="385" y="252" width="120" height="52" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#04342C" x="445" y="275" text-anchor="middle">ROS2 Node</text>
  <text font-family="Arial" font-size="10" fill="#085041" x="445" y="292" text-anchor="middle">ROS2 Jazzy</text>

  <rect x="535" y="252" width="90" height="52" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#04342C" x="580" y="275" text-anchor="middle">Zenoh</text>
  <text font-family="Arial" font-size="10" fill="#085041" x="580" y="292" text-anchor="middle">Bridge</text>

  <!-- Agent <-> ROS2: 박스 아래로 우회 (y=318) -->
  <path d="M122 304 L122 320 L445 320 L445 304" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr-t)" marker-start="url(#arr-t)"/>
  <!-- LiDAR -> ROS2 -->
  <line x1="355" y1="278" x2="383" y2="278" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr-t)"/>
  <!-- ROS2 <-> Zenoh -->
  <line x1="505" y1="278" x2="533" y2="278" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr-t)" marker-start="url(#arr-t)"/>

  <!-- ↕ 2→3 -->
  <line x1="340" y1="355" x2="340" y2="385" stroke="#888" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text font-family="Arial" font-size="10" fill="#666" x="356" y="373">WAN / Zenoh</text>

  <!-- ══ Layer 3: x86 ══ -->
  <rect x="30" y="385" width="620" height="178" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text font-family="Arial" font-size="11" fill="#0C447C" x="50" y="405">Cloud &amp; Desktop</text>
  <text font-family="Arial" font-size="13" font-weight="700" fill="#042C53" x="50" y="423">x86 Server</text>

  <!-- Boxes y=435 -->
  <rect x="55"  y="435" width="130" height="52" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#042C53" x="120" y="458" text-anchor="middle">Zenoh Router</text>
  <text font-family="Arial" font-size="10" fill="#0C447C" x="120" y="475" text-anchor="middle">Message bus</text>

  <rect x="215" y="435" width="140" height="52" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#042C53" x="285" y="458" text-anchor="middle">SLAM / Nav2</text>
  <text font-family="Arial" font-size="10" fill="#0C447C" x="285" y="475" text-anchor="middle">Navigation</text>

  <rect x="385" y="435" width="140" height="52" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#042C53" x="455" y="458" text-anchor="middle">YOLO Inference</text>
  <text font-family="Arial" font-size="10" fill="#0C447C" x="455" y="475" text-anchor="middle">Object detection</text>

  <rect x="205" y="506" width="180" height="36" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="600" fill="#042C53" x="295" y="528" text-anchor="middle">Foxglove / RViz</text>

  <!-- Router <-> SLAM -->
  <line x1="185" y1="461" x2="213" y2="461" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr-b)" marker-start="url(#arr-b)"/>
  <!-- Router <-> YOLO: 박스 아래로 우회 (y=500) -->
  <path d="M120 487 L120 500 L455 500 L455 487" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr-b)" marker-start="url(#arr-b)"/>
  <!-- SLAM -> Foxglove -->
  <line x1="285" y1="487" x2="285" y2="504" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr-b)"/>
</svg>
